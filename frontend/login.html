<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>КондитерПРО — Вход</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--brown:#3d2b1f;--caramel:#c8853a;--cream:#f5ede0;--border:#e0d5c5;--text:#2a1f14;--text2:#7a6555;--red:#c0392b}
body{min-height:100vh;background:#faf8f5;display:flex;align-items:center;justify-content:center;font-family:'Jost',sans-serif}
.card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:52px 44px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(61,43,31,.09);animation:up .4s ease}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{text-align:center;margin-bottom:36px}
.logo-icon{font-size:44px}
.logo-title{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:700;color:var(--brown);margin-top:8px}
.logo-sub{font-size:11px;color:var(--text2);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.group{margin-bottom:18px}
label{display:block;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:2px;margin-bottom:7px}
input{width:100%;background:var(--cream);border:1.5px solid var(--border);border-radius:9px;padding:13px 15px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;font-family:'Jost',sans-serif}
input:focus{border-color:var(--caramel)}
.err{display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:11px 13px;color:var(--red);font-size:13px;margin-bottom:16px}
.btn{width:100%;padding:14px;border:none;border-radius:9px;background:var(--brown);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:background .2s;font-family:'Jost',sans-serif}
.btn:hover{background:var(--caramel)}
.btn:disabled{opacity:.6;cursor:not-allowed}
</style>
</head>
<body>
<!-- PocketBase JS SDK (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.5/dist/pocketbase.umd.js"></script>
<script src="js/api.js"></script>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🎂</div>
    <div class="logo-title">КондитерПРО</div>
    <div class="logo-sub">Система управления производством</div>
  </div>
  <div class="err" id="err-box"></div>
  <div class="group">
    <label>Логин</label>
    <input type="text" id="inp-u" placeholder="Введите логин" autocomplete="username">
  </div>
  <div class="group">
    <label>Пароль</label>
    <input type="password" id="inp-p" placeholder="Введите пароль" autocomplete="current-password">
  </div>
  <button class="btn" id="login-btn">Войти</button>
</div>

<script>
(async function(){
  // Если уже залогинен — сразу на главную
  const me = await API.me();
  if (me) { location.href = '/'; return; }

  const btn    = document.getElementById('login-btn');
  const inpU   = document.getElementById('inp-u');
  const inpP   = document.getElementById('inp-p');
  const errBox = document.getElementById('err-box');

  function showErr(msg) { errBox.textContent = msg; errBox.style.display = 'block'; }
  function hideErr()    { errBox.style.display = 'none'; }
  function setBusy(on)  { btn.disabled = on; btn.textContent = on ? 'Вхожу…' : 'Войти'; }

  async function doLogin() {
    hideErr();
    const username = inpU.value.trim();
    const password = inpP.value;
    if (!username || !password) { showErr('Введите логин и пароль'); return; }
    setBusy(true);
    try {
      await pbLogin(username, password);
      location.href = '/';
    } catch (e) {
      showErr('Неверный логин или пароль');
    } finally {
      setBusy(false);
    }
  }

  btn.addEventListener('click', doLogin);
  inpU.addEventListener('keydown', e => { if (e.key === 'Enter') inpP.focus(); });
  inpP.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
})();
</script>
</body>
</html>
